name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            services/auth-service/requirements.txt
            services/transaction-service/requirements.txt
            services/web-app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -r services/auth-service/requirements.txt
          python -m pip install -r services/transaction-service/requirements.txt
          python -m pip install -r services/web-app/requirements.txt

      - name: Run local CI checks
        run: |
          python scripts/ci_check.py
