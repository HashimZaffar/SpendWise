title = "SpendWise Gitleaks Configuration"

[extend]
useDefault = true

[[allowlists]]
description = "Allow SpendWise GHCR image references tagged with Git commit SHAs"
regexTarget = "line"
regexes = [
  '''ghcr\.io/hashimzaffar/spendwise-(web-app|auth-service|transaction-service):[0-9a-f]{40}''',
]
