apiVersion: v1
kind: ConfigMap
metadata:
  name: spendwise-config
  namespace: spendwise-test-lab
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  JWT_EXPIRES_MINUTES: "120"
  SERVICE_TIMEOUT_SECONDS: "5"
  SESSION_COOKIE_SECURE: "false"
  SESSION_COOKIE_HTTPONLY: "true"
  SESSION_COOKIE_SAMESITE: "Lax"
  AUTH_SERVICE_URL: "http://auth-service:5001"
  TRANSACTION_SERVICE_URL: "http://transaction-service:5002"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
  namespace: spendwise-test-lab
data:
  01-create-spendwise-databases.sql: |
    CREATE DATABASE spendwise_auth_db;
    CREATE DATABASE spendwise_transaction_db;

    \connect spendwise_auth_db;

    CREATE TABLE IF NOT EXISTS users (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        email VARCHAR(120) NOT NULL UNIQUE,
        password_hash VARCHAR(255) NOT NULL,
        created_at TIMESTAMP WITHOUT TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE INDEX IF NOT EXISTS ix_users_email ON users (email);

    \connect spendwise_transaction_db;

    CREATE TABLE IF NOT EXISTS transactions (
        id SERIAL PRIMARY KEY,
        user_id INTEGER NOT NULL,
        title VARCHAR(100) NOT NULL,
        amount DOUBLE PRECISION NOT NULL,
        type VARCHAR(20) NOT NULL,
        category VARCHAR(50) NOT NULL,
        created_at TIMESTAMP WITHOUT TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE INDEX IF NOT EXISTS ix_transactions_user_id ON transactions (user_id);
