apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spendwise-ingress
  namespace: spendwise
spec:
  ingressClassName: nginx
  rules:
    - host: spendwise.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-app
                port:
                  number: 5000