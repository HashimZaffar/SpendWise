apiVersion: v1
kind: Service
metadata:
  name: web-app
  namespace: spendwise-test-lab
spec:
  type: ClusterIP
  selector:
    app: web-app
  ports:
    - name: http
      port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: spendwise-test-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web-app
          image: ghcr.io/hashimzaffar/spendwise-web-app:6d5987e8207a48fa22649c34d27c64991c377f21
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: WEB_APP_PORT
              value: "5000"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: spendwise-secrets
                  key: SECRET_KEY
          envFrom:
            - configMapRef:
                name: spendwise-config
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 20
