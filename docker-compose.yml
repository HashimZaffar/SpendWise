services:
  auth-db:
    image: postgres:16
    environment:
      POSTGRES_DB: spendwise_auth_db
      POSTGRES_USER: spendwise_user
      POSTGRES_PASSWORD: spendwise_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendwise_user -d spendwise_auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data

  transaction-db:
    image: postgres:16
    environment:
      POSTGRES_DB: spendwise_transaction_db
      POSTGRES_USER: spendwise_user
      POSTGRES_PASSWORD: spendwise_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendwise_user -d spendwise_transaction_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5434:5432"
    volumes:
      - transaction-db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./services/auth-service
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      AUTH_DATABASE_URL: postgresql://spendwise_user:spendwise_password@auth-db:5432/spendwise_auth_db
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-secret}
      JWT_EXPIRES_MINUTES: 120
      AUTH_SERVICE_PORT: 5001
    depends_on:
      auth-db:
        condition: service_healthy
    ports:
      - "5001:5001"

  transaction-service:
    build:
      context: ./services/transaction-service
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      TRANSACTION_DATABASE_URL: postgresql://spendwise_user:spendwise_password@transaction-db:5432/spendwise_transaction_db
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-secret}
      TRANSACTION_SERVICE_PORT: 5002
    depends_on:
      transaction-db:
        condition: service_healthy
    ports:
      - "5002:5002"

  web-app:
    build:
      context: ./services/web-app
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      SECRET_KEY: ${SECRET_KEY:-change-this-to-a-long-random-secret}
      WEB_APP_PORT: 5000
      AUTH_SERVICE_URL: http://auth-service:5001
      TRANSACTION_SERVICE_URL: http://transaction-service:5002
      SERVICE_TIMEOUT_SECONDS: 5
      SESSION_COOKIE_SECURE: "false"
      SESSION_COOKIE_HTTPONLY: "true"
      SESSION_COOKIE_SAMESITE: Lax
    depends_on:
      - auth-service
      - transaction-service
    ports:
      - "5000:5000"

volumes:
  auth-db-data:
  transaction-db-data:
